{{- $host := required "ingress.host is required" .Values.ingress.host -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "ade-node-sample.name" . }}
  labels:
    {{- include "ade-node-sample.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ $host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "ade-node-sample.name" . }}
                port:
                  number: {{ .Values.service.port }}
  tls:
    # AKS App Routing supplies the signed wildcard certificate for its managed
    # default domain, so no user-managed or self-signed secret is referenced.
    - hosts:
        - {{ $host | quote }}
