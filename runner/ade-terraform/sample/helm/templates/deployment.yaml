apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ade-node-sample.name" . }}
  labels:
    {{- include "ade-node-sample.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "ade-node-sample.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "ade-node-sample.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "ade-node-sample.name" . }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: "{{ required "image.repository is required" .Values.image.repository }}:{{ required "image.tag is required" .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          env:
            - name: ENVIRONMENT_ID
              value: {{ .Values.environment.id | quote }}
            - name: ENVIRONMENT_NAME
              value: {{ .Values.environment.name | quote }}
            - name: GOLDEN_PATH
              value: aks
            - name: REGION_NAME
              value: {{ .Values.environment.region | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
