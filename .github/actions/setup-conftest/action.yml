name: Set up Conftest
description: Install the repository-pinned Conftest release after checksum verification
runs:
  using: composite
  steps:
    - name: Install Conftest 0.68.2
      shell: bash
      env:
        CONFTEST_VERSION: "0.68.2"
        CONFTEST_SHA256: e8144c6d6d2ae0260b869caa60c7c262a1f95ac63ec1e5d2fb19be452d606347
      run: |
        set -euo pipefail
        install_dir="${RUNNER_TEMP}/conftest-${CONFTEST_VERSION}"
        archive="${RUNNER_TEMP}/conftest-${CONFTEST_VERSION}.tar.gz"
        mkdir -p "$install_dir"
        curl --fail --show-error --silent --location --retry 5 \
          "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_${CONFTEST_VERSION}_Linux_x86_64.tar.gz" \
          --output "$archive"
        echo "${CONFTEST_SHA256}  ${archive}" | sha256sum --check --strict
        tar --extract --gzip --file "$archive" --directory "$install_dir" conftest
        chmod 0755 "${install_dir}/conftest"
        echo "$install_dir" >> "$GITHUB_PATH"
        "${install_dir}/conftest" --version | grep --extended-regexp "Conftest: ${CONFTEST_VERSION}$"
