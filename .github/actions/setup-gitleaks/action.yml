name: Set up Gitleaks
description: Install the repository-pinned Gitleaks release after checksum verification
runs:
  using: composite
  steps:
    - name: Install Gitleaks 8.24.3
      shell: bash
      env:
        GITLEAKS_VERSION: "8.24.3"
        GITLEAKS_SHA256: 9991e0b2903da4c8f6122b5c3186448b927a5da4deef1fe45271c3793f4ee29c
      run: |
        set -euo pipefail
        install_dir="${RUNNER_TEMP}/gitleaks-${GITLEAKS_VERSION}"
        archive="${RUNNER_TEMP}/gitleaks-${GITLEAKS_VERSION}.tar.gz"
        mkdir -p "$install_dir"
        curl --fail --show-error --silent --location --retry 5 \
          "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
          --output "$archive"
        echo "${GITLEAKS_SHA256}  ${archive}" | sha256sum --check --strict
        tar --extract --gzip --file "$archive" --directory "$install_dir" gitleaks
        chmod 0755 "${install_dir}/gitleaks"
        echo "$install_dir" >> "$GITHUB_PATH"
        "${install_dir}/gitleaks" version | grep --fixed-strings --line-regexp "${GITLEAKS_VERSION}"
