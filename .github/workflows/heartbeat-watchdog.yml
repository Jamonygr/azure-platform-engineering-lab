name: Lifecycle heartbeat watchdog

on:
  schedule:
    - cron: "7 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  issues: write

env:
  INVENTORY_STORAGE_ACCOUNT: ${{ vars.INVENTORY_STORAGE_ACCOUNT }}

concurrency:
  group: lifecycle-heartbeat-watchdog
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    environment: lifecycle
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ./.github/actions/setup-controller
      - uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ vars.AZURE_LIFECYCLE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - name: Require a recent successful reconciliation
        env:
          HEARTBEAT_MAX_AGE_MINUTES: "35"
        run: node --experimental-strip-types controller/src/cli.ts heartbeat-status
      - name: Open one deduplicated missing-heartbeat alert
        if: failure()
        uses: ./.github/actions/open-platform-alert
        with:
          token: ${{ github.token }}
          title: "[platform-alert] lifecycle reconciler heartbeat missing"
          body: "No recent successful lifecycle heartbeat was found; review the reconciler and watchdog schedules."
