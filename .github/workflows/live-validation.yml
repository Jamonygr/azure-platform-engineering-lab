name: Live golden-path validation

on:
  workflow_dispatch:
    inputs:
      golden_path:
        description: Golden path to provision, validate, and destroy
        required: true
        type: choice
        default: web-app
        options:
          - web-app
          - container-app
          - aks
      location:
        description: Allowed Azure region
        required: true
        type: choice
        default: westeurope
        options:
          - westeurope
          - northeurope
          - germanywestcentral
      confirmation:
        description: Type RUN LIVE VALIDATION to acknowledge billable Azure creation and immediate teardown
        required: true
        type: string

permissions:
  contents: read
  id-token: write
  issues: write

env:
  INVENTORY_STORAGE_ACCOUNT: ${{ vars.INVENTORY_STORAGE_ACCOUNT }}
  TF_STATE_RESOURCE_GROUP: ${{ vars.TF_STATE_RESOURCE_GROUP }}
  TF_STATE_STORAGE_ACCOUNT: ${{ vars.TF_STATE_STORAGE_ACCOUNT }}
  TF_STATE_CONTAINER: ${{ vars.TF_STATE_CONTAINER }}
  TF_LOCK_CONTAINER: ${{ vars.TF_LOCK_CONTAINER }}
  GENERATED_REPOSITORY_OWNER: ${{ vars.GENERATED_REPOSITORY_OWNER }}
  GENERATED_OWNER_MODE: ${{ vars.GENERATED_OWNER_MODE }}
  ORGANIZATION_REQUESTERS: ${{ vars.ORGANIZATION_REQUESTERS }}
  TEMPLATE_REPOSITORY_OWNER: ${{ vars.TEMPLATE_REPOSITORY_OWNER }}
  TEMPLATE_REPOSITORY_NAME: ${{ vars.TEMPLATE_REPOSITORY_NAME }}
  PLATFORM_LOG_ANALYTICS_WORKSPACE_ID: ${{ vars.PLATFORM_LOG_ANALYTICS_WORKSPACE_ID }}
  PLATFORM_LOG_ANALYTICS_WORKSPACE_IDS_JSON: ${{ vars.PLATFORM_LOG_ANALYTICS_WORKSPACE_IDS_JSON }}
  PLATFORM_ACTION_GROUP_ID: ${{ vars.PLATFORM_ACTION_GROUP_ID }}
  PLATFORM_ADMIN_EMAIL: ${{ vars.PLATFORM_ADMIN_EMAIL }}
  PLATFORM_ADMINS: ${{ vars.PLATFORM_ADMINS }}
  SHARED_ACR_ID: ${{ vars.SHARED_ACR_ID }}
  DEVELOPER_GROUP_OBJECT_ID: ${{ vars.DEVELOPER_GROUP_OBJECT_ID }}
  PLATFORM_POLICY_DEFINITION_IDS_JSON: ${{ vars.PLATFORM_POLICY_DEFINITION_IDS_JSON }}
  AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  ENABLE_REPOSITORY_DELETE: "true"
  PLATFORM_LOGS_INGESTION_ENDPOINT: ${{ vars.PLATFORM_LOGS_INGESTION_ENDPOINT }}
  PLATFORM_DCR_IMMUTABLE_ID: ${{ vars.PLATFORM_DCR_IMMUTABLE_ID }}
  PLATFORM_DCR_STREAM: ${{ vars.PLATFORM_DCR_STREAM }}

concurrency:
  group: live-validation-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  provision:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    environment: ${{ inputs.golden_path == 'aks' && 'aks-approval' || 'lifecycle' }}
    outputs:
      environment_id: ${{ steps.provision.outputs.environment_id }}
      record_json: ${{ steps.provision.outputs.record_json }}
      provision_outcome: ${{ steps.provision.outcome }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Confirm destructive live validation
        shell: bash
        env:
          CONFIRMATION: ${{ inputs.confirmation }}
        run: |
          set -euo pipefail
          test "$CONFIRMATION" = "RUN LIVE VALIDATION" || {
            echo "confirmation must exactly equal RUN LIVE VALIDATION" >&2
            exit 1
          }
      - uses: ./.github/actions/setup-controller
      - uses: ./.github/actions/setup-conftest
      - uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ vars.AZURE_LIFECYCLE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - name: Derive collision-resistant live names
        id: names
        shell: pwsh
        env:
          GOLDEN_PATH: ${{ inputs.golden_path }}
        run: |
          $suffix = [string]$env:GITHUB_RUN_ID
          if ($suffix.Length -gt 10) { $suffix = $suffix.Substring($suffix.Length - 10) }
          "environment_name=live-$suffix" >> $env:GITHUB_OUTPUT
          "repository_name=live-$($env:GOLDEN_PATH)-$suffix" >> $env:GITHUB_OUTPUT
      - name: Provision through the production request transaction
        id: provision
        continue-on-error: true
        shell: pwsh
        env:
          GOLDEN_PATH: ${{ inputs.golden_path }}
          ENVIRONMENT_NAME: ${{ steps.names.outputs.environment_name }}
          REPOSITORY_NAME: ${{ steps.names.outputs.repository_name }}
          LOCATION: ${{ inputs.location }}
          TTL_HOURS: "4"
          ACKNOWLEDGE_AKS_COST: ${{ inputs.golden_path == 'aks' }}
          REQUESTER: ${{ github.actor }}
          PLATFORM_GITHUB_APP_ID: ${{ vars.PLATFORM_GITHUB_APP_ID }}
          PLATFORM_GITHUB_APP_PRIVATE_KEY: ${{ secrets.PLATFORM_GITHUB_APP_PRIVATE_KEY }}
          PLATFORM_REPOSITORY: ${{ github.repository }}
        run: ./scripts/Invoke-Environment.ps1 -Operation Request
      - name: Validate the live HTTPS contract
        if: steps.provision.outcome == 'success'
        shell: pwsh
        env:
          RECORD_JSON: ${{ steps.provision.outputs.record_json }}
        run: |
          $record = $env:RECORD_JSON | ConvertFrom-Json
          if ($record.phase -ne 'ACTIVE') { throw "Expected ACTIVE, received $($record.phase)." }
          if ($record.endpoint -notmatch '^https://') { throw 'The live endpoint is not trusted HTTPS.' }
          foreach ($path in @('/', '/healthz', '/readyz', '/metadata')) {
            $response = Invoke-WebRequest -Uri ($record.endpoint.TrimEnd('/') + $path) -MaximumRetryCount 5 -RetryIntervalSec 10
            if ($response.StatusCode -ne 200) { throw "$path returned HTTP $($response.StatusCode)." }
          }
      - name: Validate generated repository identity and OIDC trust
        if: steps.provision.outcome == 'success'
        shell: pwsh
        env:
          RECORD_JSON: ${{ steps.provision.outputs.record_json }}
          PLATFORM_GITHUB_APP_ID: ${{ vars.PLATFORM_GITHUB_APP_ID }}
          PLATFORM_GITHUB_APP_PRIVATE_KEY: ${{ secrets.PLATFORM_GITHUB_APP_PRIVATE_KEY }}
        run: |
          . ./scripts/GitHubAppAuthentication.ps1
          Initialize-GitHubAppAuthentication
          Update-GitHubAppInstallationToken
          $record = $env:RECORD_JSON | ConvertFrom-Json
          $headers = @{
            Authorization = "Bearer $($env:GITHUB_TOKEN)"
            Accept = 'application/vnd.github+json'
            'X-GitHub-Api-Version' = '2026-03-10'
          }
          $repository = Invoke-RestMethod -Uri "https://api.github.com/repositories/$($record.repository.numericId)" -Headers $headers
          if ([int64]$repository.id -ne [int64]$record.repository.numericId -or $repository.node_id -ne $record.repository.nodeId) {
            throw 'Generated repository immutable identity does not match inventory.'
          }
          if ($repository.private -eq $true -or $repository.visibility -ne 'public') { throw 'Generated repository must be public for this lab.' }
          $runs = Invoke-RestMethod -Uri "$($repository.url)/actions/workflows/deploy.yml/runs?event=workflow_dispatch&per_page=10" -Headers $headers
          $successfulRun = @($runs.workflow_runs | Where-Object { $_.conclusion -eq 'success' } | Sort-Object created_at -Descending) | Select-Object -First 1
          if (-not $successfulRun) {
            throw 'No successful generated-repository OIDC deployment run was found.'
          }
          $deployedCommit = Invoke-RestMethod -Uri "$($repository.url)/commits/$($successfulRun.head_sha)" -Headers $headers
          if ([string]$deployedCommit.sha -cne [string]$successfulRun.head_sha) {
            throw 'The successful deployment is not bound to a resolvable immutable source commit.'
          }

          $federatedCredentialId = @($record.resourceIds | Where-Object { $_ -match '/federatedIdentityCredentials/' }) | Select-Object -First 1
          if (-not $federatedCredentialId) { throw 'Inventory does not track the generated-repository federated credential.' }
          $federatedCredentialJson = & az rest --method get --uri "https://management.azure.com${federatedCredentialId}?api-version=2023-01-31" --output json
          if ($LASTEXITCODE -ne 0) { throw 'Could not read the tracked federated credential.' }
          $federatedCredential = ($federatedCredentialJson | Out-String) | ConvertFrom-Json
          $expectedSubject = "repo:$($repository.owner.login)/$($repository.name):environment:deployment"
          if ($federatedCredential.properties.issuer -ne 'https://token.actions.githubusercontent.com' -or
              $federatedCredential.properties.subject -cne $expectedSubject -or
              'api://AzureADTokenExchange' -notin @($federatedCredential.properties.audiences)) {
            throw 'The tracked federated credential does not implement the exact generated-repository deployment trust.'
          }
      - name: Validate immutable container delivery
        if: steps.provision.outcome == 'success' && inputs.golden_path != 'web-app'
        shell: pwsh
        env:
          RECORD_JSON: ${{ steps.provision.outputs.record_json }}
        run: |
          $record = $env:RECORD_JSON | ConvertFrom-Json
          $acrName = ($env:SHARED_ACR_ID -split '/')[-1]
          $expectedPrefix = "$acrName.azurecr.io/$($record.imageRepository)@sha256:"
          if ($record.goldenPath -eq 'container-app') {
            $resourceId = @($record.resourceIds | Where-Object { $_ -match '/providers/Microsoft\.App/containerApps/[^/]+$' }) | Select-Object -First 1
            $image = & az containerapp show --ids $resourceId --query 'properties.template.containers[0].image' --output tsv
            if ($LASTEXITCODE -ne 0) { throw 'Could not inspect the deployed Container App image.' }
          }
          else {
            $clusterId = @($record.resourceIds | Where-Object { $_ -match '/providers/Microsoft\.ContainerService/managedClusters/[^/]+$' }) | Select-Object -First 1
            $parts = $clusterId -split '/'
            $resourceGroup = $parts[4]
            $clusterName = $parts[-1]
            $commandJson = & az aks command invoke --resource-group $resourceGroup --name $clusterName --command "kubectl -n golden-path get deployment golden-path -o jsonpath='{.spec.template.spec.containers[0].image}'" --output json
            if ($LASTEXITCODE -ne 0) { throw 'Could not inspect the deployed AKS workload image.' }
            $command = ($commandJson | Out-String) | ConvertFrom-Json
            $image = [string]$command.logs
          }
          $digestReference = [regex]::Match([string]$image, [regex]::Escape($expectedPrefix) + '[0-9a-f]{64}').Value
          if (-not $digestReference) { throw "The deployed image is not pinned to the expected ACR repository digest: $image" }
      - name: Validate live cost, policy, monitoring, and inventory controls
        if: steps.provision.outcome == 'success'
        shell: pwsh
        env:
          RECORD_JSON: ${{ steps.provision.outputs.record_json }}
        run: |
          function Invoke-AzureJson {
            param([Parameter(Mandatory)] [string[]] $Arguments)
            $raw = & az @Arguments
            if ($LASTEXITCODE -ne 0) { throw "Azure CLI failed: az $($Arguments -join ' ')" }
            return (($raw | Out-String) | ConvertFrom-Json)
          }

          $record = $env:RECORD_JSON | ConvertFrom-Json
          $diagnosticPattern = switch ($record.goldenPath) {
            'web-app' { '/providers/Microsoft\.Web/sites/[^/]+$' }
            'container-app' { '/providers/Microsoft\.App/managedEnvironments/[^/]+$' }
            'aks' { '/providers/Microsoft\.ContainerService/managedClusters/[^/]+$' }
            default { throw "Unsupported golden path $($record.goldenPath)." }
          }
          $diagnosticTarget = @($record.resourceIds | Where-Object { $_ -match $diagnosticPattern }) | Select-Object -First 1
          if (-not $diagnosticTarget) { throw 'Inventory does not contain the expected diagnostics target.' }
          $diagnostics = Invoke-AzureJson @('monitor', 'diagnostic-settings', 'list', '--resource', $diagnosticTarget, '--output', 'json')
          if (@($diagnostics.value).Count -lt 1) { throw "No diagnostic setting exists on $diagnosticTarget." }

          $alertIds = @($record.resourceIds | Where-Object { $_ -match '/providers/Microsoft\.Insights/(metricAlerts|activityLogAlerts)/' })
          if ($alertIds.Count -lt 1) { throw 'Inventory does not track a golden-path alert.' }
          foreach ($alertId in $alertIds) {
            Invoke-AzureJson @('resource', 'show', '--ids', $alertId, '--output', 'json') | Out-Null
          }

          $expectedBudget = switch ($record.goldenPath) { 'web-app' { 10 }; 'container-app' { 15 }; 'aks' { 75 } }
          foreach ($resourceGroup in @($record.resourceGroupNames)) {
            $scope = "/subscriptions/$($env:AZURE_SUBSCRIPTION_ID)/resourceGroups/$resourceGroup"
            $budgets = Invoke-AzureJson @('rest', '--method', 'get', '--uri', "https://management.azure.com${scope}/providers/Microsoft.Consumption/budgets?api-version=2023-11-01", '--output', 'json')
            if (-not @($budgets.value | Where-Object { [decimal]$_.properties.amount -eq $expectedBudget }).Count) {
              throw "Resource group $resourceGroup does not expose the expected $expectedBudget budget."
            }
          }

          $expectedPolicyCount = 0
          if ($env:PLATFORM_POLICY_DEFINITION_IDS_JSON) {
            $definitions = $env:PLATFORM_POLICY_DEFINITION_IDS_JSON | ConvertFrom-Json
            $expectedPolicyCount = @($definitions.PSObject.Properties).Count
          }
          if ($expectedPolicyCount -gt 0) {
            $primaryScope = "/subscriptions/$($env:AZURE_SUBSCRIPTION_ID)/resourceGroups/$($record.resourceGroupNames[0])"
            $assignments = Invoke-AzureJson @('policy', 'assignment', 'list', '--scope', $primaryScope, '--output', 'json')
            $assignmentsAtScope = @($assignments | Where-Object { ([string]$_.scope).TrimEnd('/') -ieq $primaryScope })
            if ($assignmentsAtScope.Count -lt $expectedPolicyCount) {
              throw "Expected at least $expectedPolicyCount resource-group policy assignments; found $($assignmentsAtScope.Count)."
            }
          }
          if ($record.goldenPath -eq 'aks') {
            $clusterPolicyIds = @($record.resourceIds | Where-Object {
              $_ -match '/providers/Microsoft\.ContainerService/managedClusters/[^/]+/providers/Microsoft\.Authorization/policyAssignments/pelab-k8s-'
            })
            if ($clusterPolicyIds.Count -ne 5) { throw "AKS inventory must track exactly five Kubernetes data-plane guardrail assignments; found $($clusterPolicyIds.Count)." }
            foreach ($clusterPolicyId in $clusterPolicyIds) {
              Invoke-AzureJson @('rest', '--method', 'get', '--uri', "https://management.azure.com${clusterPolicyId}?api-version=2023-04-01", '--output', 'json') | Out-Null
            }
          }

      - name: Open or update the central live-validation alert
        if: failure() || steps.provision.outcome == 'failure'
        uses: ./.github/actions/open-platform-alert
        with:
          token: ${{ github.token }}
          title: "[platform-alert] live validation failed"
          body: "A live golden-path create or acceptance check failed; cleanup remains a separate required job."

  cleanup:
    if: always() && needs.provision.outputs.environment_id != ''
    needs: provision
    runs-on: ubuntu-latest
    timeout-minutes: 180
    environment: destructive-operations
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ./.github/actions/setup-controller
      - uses: ./.github/actions/setup-conftest
      - uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ vars.AZURE_LIFECYCLE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - name: Destroy, prove Azure absence, and delete the generated repository
        shell: pwsh
        env:
          ENVIRONMENT_ID: ${{ needs.provision.outputs.environment_id }}
          CONFIRMATION: ${{ needs.provision.outputs.environment_id }}
          PLATFORM_GITHUB_APP_ID: ${{ vars.PLATFORM_GITHUB_APP_ID }}
          PLATFORM_GITHUB_APP_PRIVATE_KEY: ${{ secrets.PLATFORM_GITHUB_APP_PRIVATE_KEY }}
          PLATFORM_REPOSITORY: ${{ github.repository }}
        run: ./scripts/Invoke-Environment.ps1 -Operation Destroy
      - name: Open or update the central live-validation alert
        if: failure()
        uses: ./.github/actions/open-platform-alert
        with:
          token: ${{ github.token }}
          title: "[platform-alert] live validation failed"
          body: "The live-validation cleanup job failed and requires lifecycle reconciliation."

  verdict:
    if: always()
    needs: [provision, cleanup]
    runs-on: ubuntu-latest
    steps:
      - name: Enforce create, validate, and verified cleanup success
        shell: bash
        env:
          PROVISION_RESULT: ${{ needs.provision.result }}
          PROVISION_OUTCOME: ${{ needs.provision.outputs.provision_outcome }}
          CLEANUP_RESULT: ${{ needs.cleanup.result }}
          ENVIRONMENT_ID: ${{ needs.provision.outputs.environment_id }}
        run: |
          set -euo pipefail
          {
            echo "## Live validation verdict"
            echo
            echo "- Environment ID: \`${ENVIRONMENT_ID:-not-recorded}\`"
            echo "- Provision job: \`${PROVISION_RESULT}\`"
            echo "- Provision transaction: \`${PROVISION_OUTCOME:-not-run}\`"
            echo "- Verified cleanup: \`${CLEANUP_RESULT}\`"
          } >> "$GITHUB_STEP_SUMMARY"
          test "$PROVISION_RESULT" = "success"
          test "$PROVISION_OUTCOME" = "success"
          test -n "$ENVIRONMENT_ID"
          test "$CLEANUP_RESULT" = "success"
