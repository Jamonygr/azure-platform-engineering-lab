name: Reconcile environments

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: Report actions without changing state
        required: true
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write
  issues: write

env:
  INVENTORY_STORAGE_ACCOUNT: ${{ vars.INVENTORY_STORAGE_ACCOUNT }}
  TF_STATE_RESOURCE_GROUP: ${{ vars.TF_STATE_RESOURCE_GROUP }}
  TF_STATE_STORAGE_ACCOUNT: ${{ vars.TF_STATE_STORAGE_ACCOUNT }}
  TF_STATE_CONTAINER: ${{ vars.TF_STATE_CONTAINER }}
  TF_LOCK_CONTAINER: ${{ vars.TF_LOCK_CONTAINER }}
  GENERATED_REPOSITORY_OWNER: ${{ vars.GENERATED_REPOSITORY_OWNER }}
  GENERATED_OWNER_MODE: ${{ vars.GENERATED_OWNER_MODE }}
  PLATFORM_LOG_ANALYTICS_WORKSPACE_ID: ${{ vars.PLATFORM_LOG_ANALYTICS_WORKSPACE_ID }}
  PLATFORM_LOG_ANALYTICS_WORKSPACE_IDS_JSON: ${{ vars.PLATFORM_LOG_ANALYTICS_WORKSPACE_IDS_JSON }}
  PLATFORM_ACTION_GROUP_ID: ${{ vars.PLATFORM_ACTION_GROUP_ID }}
  PLATFORM_ADMIN_EMAIL: ${{ vars.PLATFORM_ADMIN_EMAIL }}
  PLATFORM_ADMINS: ${{ vars.PLATFORM_ADMINS }}
  SHARED_ACR_ID: ${{ vars.SHARED_ACR_ID }}
  DEVELOPER_GROUP_OBJECT_ID: ${{ vars.DEVELOPER_GROUP_OBJECT_ID }}
  PLATFORM_POLICY_DEFINITION_IDS_JSON: ${{ vars.PLATFORM_POLICY_DEFINITION_IDS_JSON }}
  AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  PLATFORM_LOGS_INGESTION_ENDPOINT: ${{ vars.PLATFORM_LOGS_INGESTION_ENDPOINT }}
  PLATFORM_DCR_IMMUTABLE_ID: ${{ vars.PLATFORM_DCR_IMMUTABLE_ID }}
  PLATFORM_DCR_STREAM: ${{ vars.PLATFORM_DCR_STREAM }}

concurrency:
  group: platform-reconciler
  cancel-in-progress: false

jobs:
  reconcile:
    runs-on: ubuntu-latest
    environment: lifecycle
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ./.github/actions/setup-controller
      - uses: ./.github/actions/setup-conftest
      - uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ vars.AZURE_LIFECYCLE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - name: Reconcile inventory
        shell: pwsh
        env:
          PLATFORM_GITHUB_APP_ID: ${{ vars.PLATFORM_GITHUB_APP_ID }}
          PLATFORM_GITHUB_APP_PRIVATE_KEY: ${{ secrets.PLATFORM_GITHUB_APP_PRIVATE_KEY }}
          ENABLE_REPOSITORY_DELETE: ${{ vars.ENABLE_REPOSITORY_DELETE }}
          RECONCILE_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || false }}
          PLATFORM_REPOSITORY: ${{ github.repository }}
        run: ./scripts/Invoke-Environment.ps1 -Operation Reconcile
      - name: Record successful reconciler heartbeat
        if: success()
        shell: pwsh
        run: |
          node --experimental-strip-types controller/src/cli.ts heartbeat
          ./scripts/Write-PlatformLifecycleLog.ps1 -Operation heartbeat -Outcome success -Message 'Scheduled lifecycle reconciliation completed.'
      - name: Emit sanitized reconciler failure to Azure Monitor
        if: failure()
        shell: pwsh
        run: ./scripts/Write-PlatformLifecycleLog.ps1 -Operation reconciler -Outcome failure -Message 'Scheduled lifecycle reconciliation failed; inspect the linked workflow run.' -BestEffort
      - name: Open one deduplicated controller alert
        if: failure()
        uses: ./.github/actions/open-platform-alert
        with:
          token: ${{ github.token }}
          title: "[platform-alert] lifecycle reconciler failed"
          body: "The scheduled lifecycle reconciler failed; inspect its isolated per-environment failures and retry state."
