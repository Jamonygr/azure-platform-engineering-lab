        <circle cx="30" cy="30" r="17" fill="#79BDE8"/>
        <text x="30" y="36" text-anchor="middle" fill="#0B1F3A" font-size="16" font-weight="700">5</text>
        <text x="58" y="35" fill="#FFFFFF" font-size="16" font-weight="700">LEARN</text>
        <text x="22" y="71" fill="#D7E8F7" font-size="13">Wiki hub</text>
        <text x="22" y="94" fill="#D7E8F7" font-size="13">AZ-305 / AZ-400</text>
        <text x="22" y="117" fill="#D7E8F7" font-size="13">Workbook</text>
