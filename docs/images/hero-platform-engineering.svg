<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Azure Platform Engineering Lab</title>
  <desc id="desc">A navy and Azure-blue banner showing a self-service developer request flowing to Web App, Container App, and AKS golden paths with policy, monitoring, and safe cleanup.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1F3A"/>
      <stop offset="1" stop-color="#0F4C81"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#061426" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="1200" height="420" fill="url(#background)"/>
  <circle cx="80" cy="45" r="88" fill="#FFFFFF" opacity="0.035"/>
  <circle cx="1120" cy="388" r="130" fill="#FFFFFF" opacity="0.035"/>
  <path d="M0 350 C220 310 340 405 580 360 S960 310 1200 350 V420 H0Z" fill="#0078D4" opacity="0.13"/>

  <g font-family="Segoe UI, Arial, sans-serif">
    <text x="70" y="116" fill="#FFFFFF" font-size="48" font-weight="700">Azure Platform Engineering Lab</text>
    <text x="70" y="158" fill="#D7E8F7" font-size="21">Self-service golden paths. Passwordless delivery. Proven cleanup.</text>

    <g transform="translate(70 202)">
      <rect width="128" height="32" rx="16" fill="#00B7C3"/>
      <text x="64" y="21" text-anchor="middle" fill="#0B1F3A" font-size="14" font-weight="700">Terraform</text>
      <rect x="140" width="166" height="32" rx="16" fill="#FFB900"/>
      <text x="223" y="21" text-anchor="middle" fill="#0B1F3A" font-size="14" font-weight="700">GitHub OIDC</text>
      <rect x="318" width="144" height="32" rx="16" fill="#7FBA00"/>
      <text x="390" y="21" text-anchor="middle" fill="#0B1F3A" font-size="14" font-weight="700">Azure AVM</text>
    </g>

    <g transform="translate(635 65)" filter="url(#shadow)">
      <rect width="188" height="76" rx="14" fill="#FFFFFF" opacity="0.96"/>
      <circle cx="38" cy="38" r="18" fill="#0078D4"/>
      <path d="M29 38 L36 45 L48 30" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="68" y="33" fill="#0B1F3A" font-size="14" font-weight="700">Developer request</text>
      <text x="68" y="53" fill="#42627E" font-size="12">path + region + TTL</text>
    </g>

    <path d="M729 151 V185 H930" fill="none" stroke="#7AA9D8" stroke-width="3"/>
    <path d="M930 185 L918 178 V192Z" fill="#7AA9D8"/>

    <g transform="translate(850 72)" filter="url(#shadow)">
      <rect width="275" height="225" rx="18" fill="#102B4D" stroke="#31C7CF" stroke-width="2"/>
      <text x="24" y="35" fill="#FFFFFF" font-size="15" font-weight="700">GOLDEN PATH CATALOG</text>
      <g transform="translate(22 54)">
        <rect width="231" height="42" rx="10" fill="#0078D4"/>
        <text x="18" y="26" fill="#FFFFFF" font-size="14" font-weight="600">Web App</text>
        <text x="211" y="26" text-anchor="end" fill="#D7E8F7" font-size="12">B1</text>
        <rect y="53" width="231" height="42" rx="10" fill="#00B7C3"/>
        <text x="18" y="79" fill="#0B1F3A" font-size="14" font-weight="700">Container App</text>
        <text x="211" y="79" text-anchor="end" fill="#0B1F3A" font-size="12">0–3</text>
        <rect y="106" width="231" height="42" rx="10" fill="#FFB900"/>
        <text x="18" y="132" fill="#0B1F3A" font-size="14" font-weight="700">AKS workload</text>
        <text x="211" y="132" text-anchor="end" fill="#0B1F3A" font-size="12">approve</text>
      </g>
    </g>

    <g transform="translate(620 325)">
      <circle cx="16" cy="16" r="16" fill="#7FBA00"/>
      <path d="M8 16 L14 22 L24 10" fill="none" stroke="#0B1F3A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="42" y="14" fill="#FFFFFF" font-size="14" font-weight="700">Azure absent first</text>
      <text x="42" y="32" fill="#D7E8F7" font-size="12">then delete generated repository</text>
    </g>
  </g>
</svg>
