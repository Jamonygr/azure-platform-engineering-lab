<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="750" viewBox="0 0 1200 750" role="img" aria-labelledby="title desc">
  <title id="title">Azure Platform Engineering Lab — current state</title>
  <desc id="desc">Repository-defined lab architecture with GitHub self-service, exact-subject OIDC, one disposable Azure subscription, shared platform resources, three golden paths, governance controls, and verified teardown.</desc>
  <defs>
    <style>
      .title{font:700 27px 'Segoe UI',Arial,sans-serif;fill:#123b5d}.sub{font:14px 'Segoe UI',Arial,sans-serif;fill:#526b7e}.h{font:700 15px 'Segoe UI',Arial,sans-serif;fill:#123b5d}.b{font:700 13px 'Segoe UI',Arial,sans-serif;fill:#123b5d}.t{font:11px 'Segoe UI',Arial,sans-serif;fill:#526b7e}.panel{fill:#eef8ff;stroke:#1689d8;stroke-width:1.4}.box{fill:#fff;stroke:#62b3ea;stroke-width:1}.dash{fill:#fff;stroke:#7898ad;stroke-width:1;stroke-dasharray:6 5}.line{stroke:#087fc8;stroke-width:2;fill:none}.green{fill:#f3fbef;stroke:#67aa39;stroke-width:1.4}.amber{fill:#fff9e8;stroke:#e6a400;stroke-width:1.2}
    </style>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#087fc8"/></marker>
  </defs>
  <rect width="1200" height="750" fill="#fff"/>
  <text x="30" y="38" class="title">AZURE PLATFORM ENGINEERING LAB — CURRENT STATE</text>
  <text x="30" y="61" class="sub">Self-service experience • shared control plane • disposable workload plane</text>
  <rect x="870" y="20" width="300" height="45" rx="7" class="amber"/><text x="1020" y="40" text-anchor="middle" class="b">REPOSITORY-DEFINED</text><text x="1020" y="56" text-anchor="middle" class="t">Not verified against a live Azure tenant</text>

  <rect x="30" y="82" width="535" height="145" rx="8" class="panel"/><text x="46" y="105" class="h">A  DEVELOPER EXPERIENCE AND GITHUB CONTROL</text>
  <rect x="48" y="124" width="95" height="72" rx="6" class="box"/><text x="95" y="151" text-anchor="middle" class="b">Developer</text><text x="95" y="169" text-anchor="middle" class="t">Platform team</text><text x="95" y="185" text-anchor="middle" class="t">requests lifecycle</text>
  <rect x="160" y="124" width="115" height="72" rx="6" class="box"/><text x="218" y="151" text-anchor="middle" class="b">Request flow</text><text x="218" y="169" text-anchor="middle" class="t">Typed inputs</text><text x="218" y="185" text-anchor="middle" class="t">CI + approvals</text>
  <rect x="292" y="124" width="115" height="72" rx="6" class="box"/><text x="350" y="151" text-anchor="middle" class="b">GitHub App</text><text x="350" y="169" text-anchor="middle" class="t">Short-lived token</text><text x="350" y="185" text-anchor="middle" class="t">Repo lifecycle</text>
  <rect x="424" y="124" width="122" height="72" rx="6" class="box"/><text x="485" y="151" text-anchor="middle" class="b">Generated repo</text><text x="485" y="169" text-anchor="middle" class="t">Scaffold + deploy</text><text x="485" y="185" text-anchor="middle" class="t">PLATFORM_READY</text>
  <path d="M143 160H160M275 160H292M407 160H424" class="line" marker-end="url(#a)"/>

  <rect x="585" y="82" width="585" height="145" rx="8" class="panel"/><text x="602" y="105" class="h">B  MICROSOFT ENTRA ID — EXACT-SUBJECT OIDC</text>
  <rect x="604" y="124" width="160" height="72" rx="6" class="box"/><text x="684" y="151" text-anchor="middle" class="b">Microsoft Entra ID</text><text x="684" y="169" text-anchor="middle" class="t">OIDC token exchange</text><text x="684" y="185" text-anchor="middle" class="t">No client secret</text>
  <rect x="781" y="124" width="160" height="72" rx="6" class="box"/><text x="861" y="151" text-anchor="middle" class="b">Platform identities</text><text x="861" y="169" text-anchor="middle" class="t">operations • lifecycle</text><text x="861" y="185" text-anchor="middle" class="t">AKS • destroy</text>
  <rect x="958" y="124" width="193" height="72" rx="6" class="box"/><text x="1055" y="151" text-anchor="middle" class="b">Generated-repo identity</text><text x="1055" y="169" text-anchor="middle" class="t">Exact repository + environment</text><text x="1055" y="185" text-anchor="middle" class="t">Workload-scoped RBAC</text>
  <path d="M764 160H781M941 160H958" class="line" marker-end="url(#a)"/>

  <rect x="30" y="245" width="1140" height="375" rx="8" class="panel"/><text x="47" y="270" class="h">C  ONE DEDICATED DISPOSABLE AZURE SUBSCRIPTION</text><text x="1145" y="270" text-anchor="end" class="t">No management-group resources declared</text>
  <rect x="50" y="288" width="250" height="160" rx="7" class="box"/><text x="66" y="313" class="h">D  BOOTSTRAP RESOURCE GROUP</text><rect x="68" y="330" width="214" height="48" rx="5" class="box"/><text x="82" y="351" class="b">State and lifecycle storage</text><text x="82" y="367" class="t">tfstate • locks • inventory • evidence</text><rect x="68" y="390" width="214" height="38" rx="5" class="box"/><text x="82" y="413" class="b">Platform workflow UAMI</text>
  <rect x="316" y="288" width="515" height="160" rx="7" class="box"/><text x="332" y="313" class="h">E  SHARED PLATFORM RESOURCE GROUP</text>
  <rect x="334" y="330" width="145" height="45" rx="5" class="box"/><text x="347" y="350" class="b">Shared ACR</text><text x="347" y="366" class="t">ABAC app paths</text><rect x="495" y="330" width="145" height="45" rx="5" class="box"/><text x="508" y="350" class="b">Log Analytics</text><text x="508" y="366" class="t">Regional workspaces</text><rect x="656" y="330" width="155" height="45" rx="5" class="box"/><text x="669" y="350" class="b">Action group</text><text x="669" y="366" class="t">Operator alerts</text>
  <rect x="334" y="389" width="145" height="39" rx="5" class="box"/><text x="347" y="413" class="b">Lifecycle UAMI</text><rect x="495" y="389" width="145" height="39" rx="5" class="box"/><text x="508" y="413" class="b">Telemetry + DCR</text><rect x="656" y="389" width="155" height="39" rx="5" class="box"/><text x="669" y="413" class="b">Heartbeat alert</text>
  <rect x="847" y="288" width="303" height="160" rx="7" class="box"/><text x="863" y="313" class="h">G  GOVERNANCE AND OPERATIONS</text><rect x="865" y="330" width="125" height="43" rx="5" class="box"/><text x="878" y="350" class="b">Azure Policy</text><text x="878" y="366" class="t">Subscription scope</text><rect x="1006" y="330" width="126" height="43" rx="5" class="box"/><text x="1019" y="350" class="b">Budgets</text><text x="1019" y="366" class="t">50 / 80 / 100%</text><rect x="865" y="389" width="125" height="39" rx="5" class="box"/><text x="878" y="413" class="b">Monitoring</text><rect x="1006" y="389" width="126" height="39" rx="5" class="box"/><text x="1019" y="413" class="b">TTL enforcement</text>

  <rect x="50" y="465" width="900" height="135" rx="7" class="box"/><text x="66" y="490" class="h">F  DISPOSABLE WORKLOAD — REQUEST SELECTS EXACTLY ONE GOLDEN PATH</text>
  <rect x="68" y="508" width="265" height="72" rx="6" class="box"/><text x="82" y="532" class="b">WEB APP RESOURCE GROUP</text><text x="82" y="550" class="t">Linux App Service B1 • public HTTPS</text><text x="82" y="566" class="t">Identity • diagnostics • alerts • policy</text>
  <rect x="350" y="508" width="265" height="72" rx="6" class="box"/><text x="364" y="532" class="b">CONTAINER APPS RESOURCE GROUP</text><text x="364" y="550" class="t">Managed environment • scale-to-zero</text><text x="364" y="566" class="t">Shared ACR • diagnostics • budget</text>
  <rect x="632" y="508" width="300" height="72" rx="6" class="box"/><text x="646" y="532" class="b">AKS + MANAGED NODE RESOURCE GROUPS</text><text x="646" y="550" class="t">Dedicated public AKS • CNI Overlay / Cilium</text><text x="646" y="566" class="t">Azure RBAC • policy • workload identity</text>
  <rect x="968" y="465" width="182" height="135" rx="7" class="dash"/><text x="1059" y="490" text-anchor="middle" class="h">OPTIONAL ADAPTER</text><text x="1059" y="532" text-anchor="middle" class="b">Azure Deployment</text><text x="1059" y="549" text-anchor="middle" class="b">Environments</text><text x="1059" y="572" text-anchor="middle" class="t">Disabled by default</text>

  <rect x="30" y="638" width="1140" height="78" rx="8" class="green"/><text x="50" y="668" class="h">H  VERIFIED TEARDOWN GATE</text><text x="50" y="691" class="t">State empty + tracked IDs / resource groups / AKS node RG / Resource Graph tags absent on two consecutive passes</text><rect x="870" y="655" width="280" height="42" rx="5" fill="#70b33f"/><text x="1010" y="681" text-anchor="middle" style="font:700 13px 'Segoe UI',Arial,sans-serif;fill:#fff">Delete generated repository only now</text>
</svg>