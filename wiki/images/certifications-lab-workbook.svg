<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc">
  <title id="title">AZ-305 and AZ-400 platform engineering workbook</title>
  <desc id="desc">A learning banner connecting Azure architecture design and DevOps engineering through hands-on platform evidence.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1F3A"/>
      <stop offset="1" stop-color="#0F4C81"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="320" rx="14" fill="url(#bg)"/>
  <g font-family="Segoe UI, Arial, sans-serif">
    <text x="600" y="60" text-anchor="middle" fill="#FFFFFF" font-size="31" font-weight="700">PLATFORM ENGINEERING LEARNING WORKBOOK</text>
    <text x="600" y="88" text-anchor="middle" fill="#D7E8F7" font-size="15">Architecture decisions + secure continuous delivery + operational evidence</text>
    <g transform="translate(102 126)">
      <rect width="285" height="115" rx="16" fill="#0078D4"/>
      <text x="142" y="41" text-anchor="middle" fill="#FFFFFF" font-size="28" font-weight="700">AZ-305</text>
      <text x="142" y="69" text-anchor="middle" fill="#D7E8F7" font-size="14">Design identity, governance,</text>
      <text x="142" y="91" text-anchor="middle" fill="#D7E8F7" font-size="14">compute, monitoring and cost</text>
      <path d="M285 57 H405" stroke="#79BDE8" stroke-width="4"/>
      <circle cx="465" cy="57" r="57" fill="#7FBA00"/>
      <path d="M438 57 L456 75 L490 38" fill="none" stroke="#0B1F3A" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="465" y="139" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="700">EVIDENCE</text>
      <path d="M522 57 H642" stroke="#79BDE8" stroke-width="4"/>
      <rect x="642" width="285" height="115" rx="16" fill="#00B7C3"/>
      <text x="784" y="41" text-anchor="middle" fill="#0B1F3A" font-size="28" font-weight="700">AZ-400</text>
      <text x="784" y="69" text-anchor="middle" fill="#0B1F3A" font-size="14">Build CI/CD, OIDC, IaC, policy,</text>
      <text x="784" y="91" text-anchor="middle" fill="#0B1F3A" font-size="14">feedback and reconciliation</text>
    </g>
  </g>
</svg>
